databases:
  - name: lms-db
    plan: free
    databaseName: lms
    user: lmsuser

services:
  - type: web
    name: lms-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: lms-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
